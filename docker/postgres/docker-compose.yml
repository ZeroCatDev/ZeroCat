services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: zerocat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zerocat
      POSTGRES_PASSWORD: zerocat_pass_change_me
      POSTGRES_DB: zerocat
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerocat -d zerocat"]
      interval: 5s
      timeout: 3s
      retries: 20
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
volumes:
  pgdata: